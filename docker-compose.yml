services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: highmotivate
      POSTGRES_PASSWORD: highmotivate
      POSTGRES_DB: highmotivate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: highmotivate
      DB_PASSWORD: highmotivate
      DB_NAME: highmotivate
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
